name: Daily CS Sync

# Runs every day at 09:00 CET (= 08:00 UTC winter / 07:00 CEST summer).
# Execution order matters:
#   1. sync_last_contact.py  — GCal → 📅 Last Meeting Date 🔒
#   2. sync_next_checkin.py  — Last Meeting Date + Tier → 📞 Next Scheduled Check-in
#   3. sync_contact_reasons.py — Intercom + GCal combined → 📞 Last Contact Date 🔒 + 💎 Reason
# Each step depends on the previous, so they run sequentially in one job.
#
# Can be triggered manually from the GitHub Actions tab → "Run workflow".

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 09:00 CET
  workflow_dispatch:         # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Get the code ────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-oauthlib requests

      # ── 3. sync_linear_status.py → Linear → Notion issue status reconciliation
      - name: Sync Linear → Notion issue statuses
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LINEAR_TOKEN: ${{ secrets.LINEAR_TOKEN }}
        run: python3 sync_linear_status.py

      # ── 4. Write Google OAuth token to file (needed by sync_last_contact.py)
      - name: Write GCal token files
        env:
          GCAL_TOKEN_JSON:      ${{ secrets.GCAL_TOKEN_JSON }}
          GCAL_CLIENT_SECRETS:  ${{ secrets.GCAL_CLIENT_SECRETS }}
        run: |
          echo "$GCAL_TOKEN_JSON"     > token.json
          echo "$GCAL_CLIENT_SECRETS" > client_secrets.json

      # ── 5. sync_last_contact.py → 📅 Last Meeting Date 🔒 ─────────────────
      - name: Run sync_last_contact.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 sync_last_contact.py

      # ── 6. sync_next_checkin.py → 📞 Next Scheduled Check-in ──────────────
      - name: Run sync_next_checkin.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 sync_next_checkin.py

      # ── 7. sync_contact_reasons.py → 📞 Last Contact Date 🔒 + 💎 Reason ──
      - name: Run sync_contact_reasons.py
        env:
          NOTION_TOKEN:   ${{ secrets.NOTION_TOKEN }}
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
        run: python3 sync_contact_reasons.py
